<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大陸行程表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--red:#b71c1c;--red2:#d32f2f;--gold:#f9a825;--ink:#111111;--paper:#ffffff;--paper2:#f5f5f5;--muted:#444444;--done-bg:#e8f5e9;--done-bdr:#2e7d32;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:18px;}
header{background:#1a1a2e;color:#fff;padding:18px 16px 14px;position:sticky;top:0;z-index:100;border-bottom:4px solid var(--red);}
.header-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.trip-title{font-size:1.35rem;font-weight:700;letter-spacing:.04em;}
.trip-sub{font-size:.85rem;color:var(--gold);margin-top:3px;font-weight:500;}
.progress-wrap{text-align:right;min-width:64px;}
.progress-num{font-size:1.4rem;font-weight:700;color:var(--gold);}
.progress-label{font-size:.78rem;color:#ccc;}
.tabs{background:#1a1a2e;display:flex;overflow-x:auto;padding:0 10px;max-width:680px;margin:0 auto;scrollbar-width:none;position:sticky;top:70px;z-index:99;border-bottom:2px solid #333;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;background:none;border:none;border-bottom:3px solid transparent;color:#bbb;padding:13px 16px;font-family:'Noto Sans TC',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--red);}
main{max-width:680px;margin:0 auto;padding:16px;padding-bottom:50px;}
.day-section{display:none;}
.day-section.active{display:block;}
.day-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #e0e0e0;}
.day-badge{background:var(--red);color:#fff;font-size:.9rem;padding:6px 14px;border-radius:20px;font-weight:700;flex-shrink:0;}
.day-date{font-size:1.1rem;font-weight:700;color:#fff;}
.day-theme{font-size:.95rem;color:#fff;margin-top:3px;font-weight:500;}
.editable-label{cursor:pointer;border-bottom:2px dashed transparent;transition:border-color .2s;}
.editable-label:hover{border-bottom-color:var(--red);}
.placeholder{color:rgba(255,255,255,.5);font-style:italic;}
.inline-edit{border:none;border-bottom:2px solid var(--red);outline:none;font-family:'Noto Sans TC',sans-serif;font-size:1rem;color:var(--ink);background:transparent;padding:2px 4px;width:160px;}
.item{background:#fff;border-radius:14px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.12);border-left:6px solid #ccc;overflow:hidden;}
.item.done{background:#f1f8f1;border-left-color:var(--done-bdr);}
.item-main{display:flex;align-items:flex-start;gap:14px;padding:16px;cursor:pointer;}
.check-box{width:30px;height:30px;border:3px solid #999;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;background:#fff;}
.item.done .check-box{background:var(--done-bdr);border-color:var(--done-bdr);}
.check-mark{color:#fff;font-size:18px;display:none;font-weight:700;}
.item.done .check-mark{display:block;}
.item-content{flex:1;min-width:0;}
.item-row1{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.time-tag{font-size:.9rem;background:#e3f2fd;color:#1565c0;padding:4px 10px;border-radius:6px;flex-shrink:0;font-weight:700;}
.item-name{font-size:1.15rem;font-weight:700;color:#111;}
.item.done .item-name{text-decoration:line-through;color:#777;}
.item-location{margin-top:8px;}
.loc-link{font-size:1rem;color:#b71c1c;text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-weight:700;padding:4px 0;}
.item-note{margin-top:8px;font-size:.95rem;color:#333;line-height:1.6;background:#fff9e6;padding:8px 10px;border-radius:8px;border-left:3px solid var(--gold);}
.item-images{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none;}
.item-images::-webkit-scrollbar{display:none;}
.item-img{flex-shrink:0;width:90px;height:90px;object-fit:cover;border-radius:10px;cursor:pointer;border:2px solid #eee;}
.item-actions{display:flex;justify-content:flex-end;padding:0 16px 12px;}
.edit-btn{background:#f5f5f5;border:1.5px solid #ccc;border-radius:8px;color:#333;font-size:.9rem;cursor:pointer;padding:6px 14px;font-family:'Noto Sans TC',sans-serif;font-weight:500;}
.add-btn{width:100%;background:#fff;border:2px dashed #aaa;border-radius:14px;padding:16px;color:#444;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;font-family:'Noto Sans TC',sans-serif;}
.empty{text-align:center;padding:40px;color:#aaa;font-size:1rem;}
/* LOADING */
.loading-bar{position:fixed;top:0;left:0;height:4px;background:var(--gold);transition:width .3s;z-index:999;width:0;}
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 24px;border-radius:24px;font-size:.95rem;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#fff;width:100%;max-width:680px;border-radius:24px 24px 0 0;padding:28px 20px 40px;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:1.2rem;font-weight:700;margin-bottom:20px;color:#111;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:.95rem;color:#333;margin-bottom:6px;font-weight:700;}
.field input,.field textarea,.field select{width:100%;border:2px solid #ccc;border-radius:10px;padding:12px 14px;font-size:1rem;font-family:'Noto Sans TC',sans-serif;outline:none;color:#111;background:#fafafa;}
.field textarea{resize:vertical;min-height:80px;}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.modal-actions{display:flex;gap:12px;margin-top:22px;}
.btn-save{flex:1;background:var(--red);color:#fff;border:none;border-radius:12px;padding:16px;font-size:1.05rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btn-cancel{flex:.5;background:#e0e0e0;color:#333;border:none;border-radius:12px;padding:16px;font-size:1.05rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btn-delete{background:none;border:2px solid var(--red2);color:var(--red2);border-radius:12px;padding:16px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.img-upload-area{border:2px dashed #aaa;border-radius:12px;padding:18px;text-align:center;cursor:pointer;margin-top:6px;background:#fafafa;}
.img-preview-list{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.img-pw{position:relative;width:80px;height:80px;}
.img-pw img{width:80px;height:80px;object-fit:cover;border-radius:10px;border:2px solid #eee;}
.img-rm{position:absolute;top:-8px;right:-8px;width:24px;height:24px;background:var(--red2);color:#fff;border:none;border-radius:50%;font-size:14px;cursor:pointer;line-height:1;font-weight:700;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:300;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox img{max-width:95vw;max-height:78vh;object-fit:contain;border-radius:10px;}
.lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:2.4rem;cursor:pointer;background:none;border:none;font-weight:700;}
.lb-nav{display:flex;gap:20px;margin-top:20px;}
.lb-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:12px 28px;border-radius:24px;cursor:pointer;font-size:1.1rem;font-family:'Noto Sans TC',sans-serif;font-weight:700;}
.lb-counter{color:#ddd;font-size:.9rem;margin-top:10px;font-weight:500;}
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>
<div class="toast" id="toast"></div>

<header>
  <div class="header-inner">
    <div>
      <div class="trip-title">&#127464;&#127475; 大陸旅遊行程</div>
      <div class="trip-sub">6 DAYS &middot; 5 NIGHTS</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-num" id="progressNum">--</div>
      <div class="progress-label">完成進度</div>
    </div>
  </div>
</header>

<div class="tabs" id="tabBar"></div>
<main id="mainContent"><div class="empty" style="padding:60px">載入中...</div></main>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-row">
      <div class="field"><label>日期</label><select id="fDay"></select></div>
      <div class="field"><label>時間</label><input type="time" id="fTime"></div>
    </div>
    <div class="field"><label>名稱</label><input type="text" id="fName" placeholder="例：天安門廣場參觀"></div>
    <div class="field"><label>位置名稱（顯示用）</label><input type="text" id="fLoc" placeholder="例：天安門廣場"></div>
    <div class="field"><label>地圖連結（貼上 Google Maps 網址）</label><input type="text" id="fMapUrl" placeholder="https://maps.app.goo.gl/..."></div>
    <div class="field">
      <label>圖片（可多張）</label>
      <div class="img-upload-area" id="uploadArea">
        <input type="file" id="fImgInput" accept="image/*" multiple style="display:none">
        <span style="font-size:.8rem;color:var(--muted)">&#128247; 點此選取圖片</span>
      </div>
      <div class="img-preview-list" id="imgPreviewList"></div>
    </div>
    <div class="field"><label>備注</label><textarea id="fNote" placeholder="例：需提前預約，帶好護照"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">取消</button>
      <button class="btn-delete" id="btnDelete" style="display:none">刪除</button>
      <button class="btn-save" id="btnSave">儲存</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&#10005;</button>
  <img id="lbImg" src="" alt="">
  <div class="lb-counter" id="lbCounter"></div>
  <div class="lb-nav">
    <button id="lbPrev">&#9664; 上一張</button>
    <button id="lbNext">下一張 &#9654;</button>
  </div>
</div>

<script>
(function() {

// ★★★ 請將下面這行換成你的 Apps Script 網址 ★★★
var API = 'https://script.google.com/macros/s/AKfycbwMOnQ4RBgQZKHxtLkdEoITn-M2UEV8JYkBTbH6WQ0HrqCISMwXwqrD8JoN3o1eafmH/exec';

var DAYS = [
  {id:1, label:'第一天', date:'出發日', theme:'抵達・入住'},
  {id:2, label:'第二天', date:'第2天', theme:''},
  {id:3, label:'第三天', date:'第3天', theme:''},
  {id:4, label:'第四天', date:'第4天', theme:''},
  {id:5, label:'第五天', date:'第5天', theme:''},
  {id:6, label:'第六天', date:'回程日', theme:'返回・結束'}
];

var items = [];
var currentDay = 1;
var editingId = null;
var pendingImages = [];
var lbImages = [];
var lbIndex = 0;

function uid() {
  return 'x' + Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function el(tag, cls) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function tx(node, text) { node.textContent = text; return node; }

// ── LOADING / TOAST ───────────────────────────────────────────────
var loadTimer = null;
function setLoading(pct) {
  document.getElementById('loadingBar').style.width = pct + '%';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(loadTimer);
  loadTimer = setTimeout(function() { t.className = 'toast'; }, 2000);
}

// ── API CALLS (JSONP 解決 CORS 問題) ─────────────────────────────
var cbIndex = 0;

function apiCall(params, cb) {
  setLoading(30);
  var cbName = '__cb' + (++cbIndex);
  var url = API + '?callback=' + cbName;
  for (var key in params) {
    if (key === 'item') {
      url += '&action=save&data=' + encodeURIComponent(JSON.stringify(params[key]));
    } else {
      url += '&' + key + '=' + encodeURIComponent(params[key]);
    }
  }

  window[cbName] = function(res) {
    setLoading(100);
    setTimeout(function() { setLoading(0); }, 400);
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    cb(null, res);
  };

  var script = document.createElement('script');
  script.src = url;
  script.onerror = function() {
    setLoading(0);
    delete window[cbName];
    cb('網路錯誤');
  };
  document.head.appendChild(script);

  // timeout 10秒
  setTimeout(function() {
    if (window[cbName]) {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      cb('逾時');
    }
  }, 10000);
}

function apiGet(params, cb) { apiCall(params, cb); }
function apiPost(body, cb) { apiCall(body, cb); }

// ── INIT：載入資料 ────────────────────────────────────────────────
function loadAll() {
  apiGet({action:'getDays'}, function(err, res) {
    if (!err && res.days && res.days.length) {
      DAYS = res.days;
      initDaySelect();
    }
    apiGet({action:'getAll'}, function(err2, res2) {
      if (!err2 && res2.items) {
        items = res2.items;
      }
      render();
    });
  });
}

// ── DAY SELECT ────────────────────────────────────────────────────
function initDaySelect() {
  var sel = document.getElementById('fDay');
  while (sel.firstChild) sel.removeChild(sel.firstChild);
  for (var i = 0; i < DAYS.length; i++) {
    var opt = document.createElement('option');
    opt.value = DAYS[i].id;
    opt.textContent = DAYS[i].label + '\uff08' + DAYS[i].date + '\uff09';
    sel.appendChild(opt);
  }
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  renderTabs();
  renderContent();
  updateProgress();
}

function renderTabs() {
  var bar = document.getElementById('tabBar');
  while (bar.firstChild) bar.removeChild(bar.firstChild);
  for (var i = 0; i < DAYS.length; i++) {
    (function(d) {
      var btn = el('button', d.id === currentDay ? 'tab-btn active' : 'tab-btn');
      tx(btn, d.label);
      btn.onclick = function() { switchDay(d.id); };
      bar.appendChild(btn);
    })(DAYS[i]);
  }
}

function renderContent() {
  var main = document.getElementById('mainContent');
  while (main.firstChild) main.removeChild(main.firstChild);

  for (var i = 0; i < DAYS.length; i++) {
    var d = DAYS[i];
    var section = el('div', d.id === currentDay ? 'day-section active' : 'day-section');
    section.id = 'day-' + d.id;

    // header
    var hdr = el('div', 'day-header');
    var badge = tx(el('span', 'day-badge'), 'DAY ' + d.id);
    var info = el('div');

    var dateEl = tx(el('div', 'day-date editable-label'), d.date);
    (function(dayObj) {
      dateEl.onclick = function(e) { e.stopPropagation(); startEditLabel(dayObj, 'date', this); };
    })(d);
    info.appendChild(dateEl);

    var themeEl = tx(el('div', d.theme ? 'day-theme editable-label' : 'day-theme editable-label placeholder'), d.theme || '點擊新增主題');
    (function(dayObj) {
      themeEl.onclick = function(e) { e.stopPropagation(); startEditLabel(dayObj, 'theme', this); };
    })(d);
    info.appendChild(themeEl);

    hdr.appendChild(badge);
    hdr.appendChild(info);
    section.appendChild(hdr);

    // items
    var dayItems = [];
    for (var j = 0; j < items.length; j++) {
      if (String(items[j].day) === String(d.id)) dayItems.push(items[j]);
    }
    dayItems.sort(function(a, b) {
      var ta = a.time || '99:99', tb = b.time || '99:99';
      return ta < tb ? -1 : ta > tb ? 1 : 0;
    });

    if (dayItems.length === 0) {
      section.appendChild(tx(el('div', 'empty'), '尚無行程，點下方新增'));
    }
    for (var k = 0; k < dayItems.length; k++) {
      section.appendChild(makeItemEl(dayItems[k]));
    }

    (function(dayId) {
      var addBtn = tx(el('button', 'add-btn'), '\uff0b 新增行程');
      addBtn.onclick = function() { openModal(dayId); };
      section.appendChild(addBtn);
    })(d.id);

    main.appendChild(section);
  }
}

function makeItemEl(item) {
  var wrap = el('div', item.done ? 'item done' : 'item');
  wrap.id = 'item-' + item.id;

  var itemMain = el('div', 'item-main');
  itemMain.onclick = (function(id) { return function() { toggleDone(id); }; })(item.id);

  var chk = el('div', 'check-box');
  chk.appendChild(tx(el('span', 'check-mark'), '\u2713'));
  itemMain.appendChild(chk);

  var content = el('div', 'item-content');
  var row1 = el('div', 'item-row1');
  if (item.time) row1.appendChild(tx(el('span', 'time-tag'), item.time));
  row1.appendChild(tx(el('span', 'item-name'), item.name));
  content.appendChild(row1);

  if (item.loc) {
    var locDiv = el('div', 'item-location');
    var url = (item.mapUrl && item.mapUrl.trim()) ? item.mapUrl.trim()
      : 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(item.loc);
    var a = el('a', 'loc-link');
    tx(a, '\uD83D\uDCCD ' + item.loc);
    a.href = url; a.target = '_blank';
    a.onclick = function(e) { e.stopPropagation(); };
    locDiv.appendChild(a);
    content.appendChild(locDiv);
  }

  if (item.note) content.appendChild(tx(el('div', 'item-note'), '\uD83D\uDCAC ' + item.note));

  itemMain.appendChild(content);
  wrap.appendChild(itemMain);

  if (item.images && item.images.length > 0) {
    var strip = el('div', 'item-images');
    for (var i = 0; i < item.images.length; i++) {
      (function(src, idx, itemId) {
        var img = document.createElement('img');
        img.className = 'item-img'; img.src = src;
        img.onclick = function(e) { e.stopPropagation(); openLightbox(itemId, idx); };
        strip.appendChild(img);
      })(item.images[i], i, item.id);
    }
    wrap.appendChild(strip);
  }

  var acts = el('div', 'item-actions');
  var editBtn = tx(el('button', 'edit-btn'), '\u270F\uFE0F \u7DE8\u8F2F');
  editBtn.onclick = (function(id) { return function(e) { e.stopPropagation(); openEdit(id); }; })(item.id);
  acts.appendChild(editBtn);
  wrap.appendChild(acts);
  return wrap;
}

function updateProgress() {
  var total = items.length, done = 0;
  for (var i = 0; i < items.length; i++) if (items[i].done) done++;
  var pct = total === 0 ? 0 : Math.round(done / total * 100);
  tx(document.getElementById('progressNum'), pct + '%');
}

// ── ACTIONS ───────────────────────────────────────────────────────
function switchDay(id) {
  currentDay = id; render();
  document.getElementById('tabBar').scrollLeft = (id - 1) * 80 - 20;
}

function toggleDone(id) {
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === id) {
      items[i].done = !items[i].done;
      var item = items[i];
      render();
      apiPost({action:'save', item:item}, function(err) {
        showToast(err ? '同步失敗' : '已儲存');
      });
      break;
    }
  }
}

// ── EDIT DAY LABEL ────────────────────────────────────────────────
function startEditLabel(dayObj, field, labelEl) {
  var current = dayObj[field] || '';
  var input = el('input', 'inline-edit');
  input.value = current;
  input.placeholder = field === 'theme' ? '主題（如：故宮・長城）' : '日期說明';
  labelEl.parentNode.replaceChild(input, labelEl);
  input.focus(); input.select();

  function commit() {
    var val = input.value.trim();
    dayObj[field] = val;
    render();
    apiCall({action:'updateDay', dayId:dayObj.id, field:field, value:val}, function(err) {
      showToast(err ? '同步失敗' : '已儲存');
    });
  }
  input.onblur = commit;
  input.onkeydown = function(e) {
    if (e.keyCode === 13) input.blur();
    if (e.keyCode === 27) { dayObj[field] = current; render(); }
  };
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(day) {
  editingId = null;
  tx(document.getElementById('modalTitle'), '\u2795 \u65B0\u589E\u884C\u7A0B');
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('fDay').value = day;
  document.getElementById('fTime').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fLoc').value = '';
  document.getElementById('fMapUrl').value = '';
  document.getElementById('fNote').value = '';
  pendingImages = []; renderPreviews();
  document.getElementById('overlay').className = 'overlay open';
}

function openEdit(id) {
  var item = null;
  for (var i = 0; i < items.length; i++) if (items[i].id === id) { item = items[i]; break; }
  if (!item) return;
  editingId = id;
  tx(document.getElementById('modalTitle'), '\u270F\uFE0F \u7DE8\u8F2F\u884C\u7A0B');
  document.getElementById('btnDelete').style.display = 'inline-block';
  document.getElementById('fDay').value = item.day;
  document.getElementById('fTime').value = item.time || '';
  document.getElementById('fName').value = item.name;
  document.getElementById('fLoc').value = item.loc || '';
  document.getElementById('fMapUrl').value = item.mapUrl || '';
  document.getElementById('fNote').value = item.note || '';
  pendingImages = item.images ? item.images.slice() : [];
  renderPreviews();
  document.getElementById('overlay').className = 'overlay open';
}

function closeModal() { document.getElementById('overlay').className = 'overlay'; }

function saveItem() {
  var name = document.getElementById('fName').value.trim();
  if (!name) { alert('\u8ACB\u8F38\u5165\u540D\u7A31'); return; }
  var data = {
    id: editingId || uid(),
    day: parseInt(document.getElementById('fDay').value, 10),
    time: document.getElementById('fTime').value,
    name: name,
    loc: document.getElementById('fLoc').value.trim(),
    mapUrl: document.getElementById('fMapUrl').value.trim(),
    note: document.getElementById('fNote').value.trim(),
    images: pendingImages.slice(),
    done: false
  };
  if (editingId) {
    for (var i = 0; i < items.length; i++) {
      if (items[i].id === editingId) { data.done = items[i].done; items[i] = data; break; }
    }
  } else {
    items.push(data);
    currentDay = data.day;
  }
  closeModal(); render();
  apiPost({action:'save', item:data}, function(err) {
    showToast(err ? '\u540C\u6B65\u5931\u6557' : '\u5DF2\u5132\u5B58\u81F3\u96F2\u7AEF');
  });
}

function deleteItem() {
  if (!editingId) return;
  if (!confirm('\u78BA\u5B9A\u8981\u522A\u9664\u9019\u500B\u884C\u7A0B\u55CE\uFF1F')) return;
  var delId = editingId;
  var next = [];
  for (var i = 0; i < items.length; i++) if (items[i].id !== delId) next.push(items[i]);
  items = next;
  closeModal(); render();
  apiCall({action:'delete', id:delId}, function(err) {
    showToast(err ? '同步失敗' : '已刪除');
  });
}

// ── IMAGES ────────────────────────────────────────────────────────
function handleImgUpload(e) {
  var files = e.target.files;
  if (!files || !files.length) return;
  showToast('上傳中...');
  var count = files.length;
  var done = 0;
  for (var i = 0; i < files.length; i++) {
    (function(f) {
      var r = new FileReader();
      r.onload = function(ev) {
        var base64full = ev.target.result;
        // 去掉 data:image/jpeg;base64, 前綴
        var base64 = base64full.split(',')[1];
        var mimeType = f.type || 'image/jpeg';
        var fileName = 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2) + '.jpg';

        // POST 上傳到 Apps Script → Google Drive
        var xhr = new XMLHttpRequest();
        xhr.open('POST', API, true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.onload = function() {
          try {
            var res = JSON.parse(xhr.responseText);
            if (res.ok && res.url) {
              pendingImages.push(res.url);
            } else {
              showToast('上傳失敗：' + (res.error || '未知錯誤'));
            }
          } catch(ex) {
            showToast('上傳失敗');
          }
          done++;
          if (done === count) {
            renderPreviews();
            showToast('圖片上傳完成');
          }
        };
        xhr.onerror = function() {
          showToast('上傳失敗');
          done++;
          if (done === count) renderPreviews();
        };
        xhr.send(
          'action=uploadImage' +
          '&data=' + encodeURIComponent(base64) +
          '&mimeType=' + encodeURIComponent(mimeType) +
          '&fileName=' + encodeURIComponent(fileName)
        );
      };
      r.readAsDataURL(f);
    })(files[i]);
  }
  e.target.value = '';
}

function renderPreviews() {
  var list = document.getElementById('imgPreviewList');
  while (list.firstChild) list.removeChild(list.firstChild);
  for (var i = 0; i < pendingImages.length; i++) {
    (function(src, idx) {
      var wrap = el('div', 'img-pw');
      var img = document.createElement('img'); img.src = src;
      var rm = tx(el('button', 'img-rm'), '\u2715');
      rm.onclick = (function(n) { return function() { pendingImages.splice(n,1); renderPreviews(); }; })(idx);
      wrap.appendChild(img); wrap.appendChild(rm);
      list.appendChild(wrap);
    })(pendingImages[i], i);
  }
}

// ── LIGHTBOX ──────────────────────────────────────────────────────
function openLightbox(itemId, idx) {
  var item = null;
  for (var i = 0; i < items.length; i++) if (items[i].id === itemId) { item = items[i]; break; }
  if (!item || !item.images.length) return;
  lbImages = item.images; lbIndex = idx; showLb();
  document.getElementById('lightbox').className = 'lightbox open';
}
function showLb() {
  document.getElementById('lbImg').src = lbImages[lbIndex];
  tx(document.getElementById('lbCounter'), (lbIndex+1) + ' / ' + lbImages.length);
}
function closeLb() { document.getElementById('lightbox').className = 'lightbox'; }

// ── WIRE EVENTS ───────────────────────────────────────────────────
document.getElementById('btnCancel').onclick = closeModal;
document.getElementById('btnSave').onclick = saveItem;
document.getElementById('btnDelete').onclick = deleteItem;
document.getElementById('overlay').onclick = function(e) { if (e.target===this) closeModal(); };
document.getElementById('uploadArea').onclick = function() { document.getElementById('fImgInput').click(); };
document.getElementById('fImgInput').onchange = handleImgUpload;
document.getElementById('lbClose').onclick = closeLb;
document.getElementById('lightbox').onclick = function(e) { if (e.target===this) closeLb(); };
document.getElementById('lbPrev').onclick = function() { lbIndex=(lbIndex-1+lbImages.length)%lbImages.length; showLb(); };
document.getElementById('lbNext').onclick = function() { lbIndex=(lbIndex+1)%lbImages.length; showLb(); };

initDaySelect();
loadAll();

})();
</script>
